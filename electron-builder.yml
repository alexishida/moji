appId: com.alexishida.moji
productName: Moji
copyright: Copyright © 2026 Alex Ishida
directories:
  output: release
  buildResources: build
publish:
  provider: github
  owner: alexishida
  repo: Moji
  # CI keeps release hidden until every platform artifact is uploaded.
  releaseType: draft
files:
  - out/**/*
  - package.json
  - samples/**/*
extraResources:
  - from: build/icon.png
    to: icon.png
fileAssociations:
  - ext: md
    name: Markdown Document
    description: Markdown Document
    role: Editor
    mimeType: text/markdown
  - ext: markdown
    name: Markdown Document
    description: Markdown Document
    role: Editor
    mimeType: text/markdown
mac:
  category: public.app-category.productivity
  darkModeSupport: true
  artifactName: ${productName}-${version}-${arch}.${ext}
  # Signing is driven by electron-builder's CSC_* environment variables. Unsigned
  # local builds still run; Gatekeeper only blocks copies downloaded from the web.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
win:
  artifactName: ${productName}.Setup.${version}.${ext}
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
linux:
  maintainer: Alex Ishida <alexishida@gmail.com>
  synopsis: Clean Markdown viewer and editor
  description: Moji is a desktop app for opening, reading, editing, and exporting Markdown files with split preview/editing, outline navigation, localized UI, and PDF, HTML, and PNG export.
  icon: build/icons
  syncDesktopName: true
  extraFiles:
    - from: build/linux/moji.desktop
      to: usr/share/applications/moji.desktop
  desktop:
    entry:
      Keywords: Markdown;Editor;Viewer;Documents;Notes;
  target:
    - AppImage
    - deb
  category: Office
  mimeTypes:
    - text/markdown
appImage:
  artifactName: ${productName}-${version}-${arch}.${ext}
  desktop:
    entry:
      X-AppImage-Repository: https://github.com/alexishida/Moji
      X-AppImage-Author: Alex Ishida
      X-AppImage-Homepage: https://github.com/alexishida/Moji
      X-AppImage-Description: Moji is a desktop app for opening, reading, editing, and exporting Markdown files with split preview/editing, outline navigation, localized UI, and PDF, HTML, and PNG export.
deb:
  artifactName: ${productName}-${version}-${arch}.${ext}
  packageCategory: editors
  fpm:
    - --deb-field
    - "Repository: https://github.com/alexishida/Moji"
    - --deb-field
    - "Author: Alex Ishida"
    - --deb-field
    - "Vcs-Browser: https://github.com/alexishida/Moji"
    - --deb-field
    - "Vcs-Git: https://github.com/alexishida/Moji.git"
    - "build/metainfo/com.alexishida.moji.metainfo.xml=/usr/share/metainfo/com.alexishida.moji.metainfo.xml"
